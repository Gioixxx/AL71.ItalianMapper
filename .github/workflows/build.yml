name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AL71.LayoutManager.sln

      - name: Build (Release)
        run: dotnet build AL71.LayoutManager.sln -c Release --no-restore

      - name: Test
        run: dotnet test AL71.LayoutManager.sln -c Release --no-build --verbosity normal
